<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单 - 披萨外卖系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .category-btn {
            padding: 8px 20px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .category-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .category-btn.active {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar">
    <a href=" " class="navbar-brand">🍕 披萨外卖</a >
    <div class="navbar-menu">
        <a href="menu.html">菜单</a >
        <a href="cart.html">购物车 <span id="cartCount" class="cart-badge">0</span></a >
        <a href="order_history.html">我的订单</a >
        <span id="userNameDisplay" style="color:#666;"></span>
        <a href="#" id="logoutBtn">退出</a >
    </div>
</nav>

<div class="container">
    <!-- 分类筛选 -->
    <div style="margin-bottom: 24px; display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="category-btn active" data-category="all">全部</button>
        <button class="category-btn" data-category="Classic">经典</button>
        <button class="category-btn" data-category="Meat">肉类</button>
        <button class="category-btn" data-category="Vegetarian">素食</button>
        <button class="category-btn" data-category="Seafood">海鲜</button>
    </div>

    <!-- 披萨列表网格 -->
    <div id="pizzaGrid" class="grid">
        <div style="text-align:center; padding:40px;">加载中...</div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    let currentCategory = 'all';

    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const userNameSpan = document.getElementById('userNameDisplay');
        if (userNameSpan) {
            userNameSpan.textContent = `欢迎，${user.name}`;
        }

        updateCartCount();
        loadPizzas();

        // 分类切换
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                loadPizzas();
            });
        });

        // 退出登录
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
        }
    });

    function updateCartCount() {
        const cart = getCart();
        const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        const span = document.getElementById('cartCount');
        if (span) span.textContent = count;
    }

    async function loadPizzas() {
        const grid = document.getElementById('pizzaGrid');
        grid.innerHTML = '<div style="text-align:center; padding:40px;">加载中...</div>';

        try {
            let url = `${API_BASE}/api/pizzas`;
            if (currentCategory !== 'all') {
                url += `?category=${currentCategory}`;
            }

            const response = await fetch(url);
            const result = await response.json();
            console.log('披萨数据:', result);

            if (result.code === 200) {
                let pizzas = result.data;
                // 如果后端没有按分类筛选，前端自己过滤
                if (currentCategory !== 'all') {
                    pizzas = pizzas.filter(p => p.category === currentCategory);
                }
                renderPizzas(pizzas);
            } else {
                grid.innerHTML = `<div style="text-align:center; padding:40px; color:#e74c3c;">加载失败：${result.message}</div>`;
            }
        } catch (error) {
            console.error('网络错误:', error);
            grid.innerHTML = '<div style="text-align:center; padding:40px; color:#e74c3c;">网络错误，请检查后端</div>';
        }
    }

    function renderPizzas(pizzas) {
        const grid = document.getElementById('pizzaGrid');
        if (!grid) return;

        if (pizzas.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:40px;">暂无披萨</div>';
            return;
        }

        grid.innerHTML = pizzas.map(pizza => {
            // 兼容两种字段名格式
            const pizzaId = pizza.pizza_id || pizza.pizzaId;
            const name = pizza.name;
            const description = pizza.description || '';
            const price = pizza.base_price || pizza.basePrice;


            return `
            <div class="pizza-card">
                <div class="info">
                    <h3>${name}</h3>
                    <div class="desc">${description}</div>
                    <div class="price">¥${price}</div>
                    <button onclick="viewPizzaDetail(${pizzaId})">add to cart</button>
                </div>
            </div>
        `;
        }).join('');
    }

    function viewPizzaDetail(pizzaId) {
        //alert('ID'+pizzaId);
        window.location.href = `pizza_detail.html?pizza_id=${pizzaId}`;
    }
</script>
</body>
</html>
