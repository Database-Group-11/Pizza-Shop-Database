<script src="js/main.js"></script>
<script>
    let allOrders = [];
    let currentFilter = 'all';

    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const userNameSpan = document.getElementById('userNameDisplay');
        if (userNameSpan) {
            userNameSpan.textContent = `欢迎，${user.name}`;
        }

        updateCartCount();
        loadOrders();

        // 筛选按钮
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.status;
                renderOrders();
            });
        });

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
        }
    });

    function updateCartCount() {
        const cart = getCart();
        const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        const span = document.getElementById('cartCount');
        if (span) span.textContent = count;
    }

    async function loadOrders() {
        const user = getCurrentUser();
        if (!user) return;

        try {
            const response = await fetch(`${API_BASE}/orders/customer?customer_id=${user.customerId}`);
            const result = await response.json();
            if (result.code === 200) {
                allOrders = result.data;
                renderOrders();
            } else {
                console.error('加载订单失败:', result.message);
            }
        } catch (error) {
            console.error('网络错误:', error);
            // 演示用空数据
            allOrders = [];
            renderOrders();
        }
    }

    function renderOrders() {
        const container = document.getElementById('ordersList');
        if (!container) return;

        let filtered = allOrders;
        if (currentFilter !== 'all') {
            // 状态映射：中文筛选条件 → 英文状态值
            const filterMap = {
                '待支付': 'pending',
                '进行中': 'paid',
                '已完成': 'completed',
                '已取消': 'cancelled'
            };
            const filterStatus = filterMap[currentFilter];
            if (filterStatus) {
                filtered = allOrders.filter(o => o.status === filterStatus);
            } else if (currentFilter === '进行中') {
                // 进行中包括：paid、preparing、delivering
                filtered = allOrders.filter(o => ['paid', 'preparing', 'delivering'].includes(o.status));
            }
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-orders"><h3>📭 暂无订单</h3><a href=" ">去点餐</a ></div>`;
            return;
        }

        container.innerHTML = filtered.map(order => {
            const statusText = getStatusText(order.status);
            const statusClass = getStatusClass(order.status);
            // 订单商品名称（最多显示2个）
            // 注意：列表接口可能不返回items，用orderNo或默认显示
            const pizzaNames = order.orderNo || `订单号: ${order.orderId}`;

            return `
                <div class="order-item" onclick="viewOrderDetail(${order.orderId})">
                    <div class="order-header">
                        <span class="order-id">订单号：${order.orderId}</span>
                        <span class="order-date">${formatDate(order.orderTime)}</span>
                        <span class="order-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="order-info">
                        <div class="order-pizzas">🍕 ${pizzaNames}</div>
                        <div class="order-total">¥${order.totalAmount}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function viewOrderDetail(orderId) {
        window.location.href = `order_status.html?order_id=${orderId}`;
    }
</script>
