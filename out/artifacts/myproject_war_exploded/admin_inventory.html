<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topping Inventory - Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px 0;
        }
        .admin-sidebar h3 {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid #444;
            margin-bottom: 20px;
        }
        .admin-sidebar a {
            display: block;
            padding: 12px 24px;
            color: #ddd;
            text-decoration: none;
            transition: 0.2s;
        }
        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: #e74c3c;
            color: white;
        }
        .admin-content {
            margin-left: 240px;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .admin-header {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .add-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .stock-input {
            width: 80px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin: 0 4px;
        }
        .btn-edit {
            background: #3498db;
            color: white;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        .btn-save {
            background: #27ae60;
            color: white;
        }
        .low-stock {
            color: #e67e22;
            font-weight: bold;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="admin-sidebar">
    <h3>🍕 Pizza Admin</h3>
    <a href=" ">📋 Order Management</a>
    <a href="admin_inventory.html" class="active">📦 Topping Inventory</a>
    <a href="admin_reports.html">📊 Reports</a>
    <a href="menu.html" style="margin-top: 50px;">🏠 Back to Store</a>
    <a href="#" id="adminLogoutBtn">🚪 Logout</a>
</div>

<div class="admin-content">
    <div class="admin-header">
        <h2>Topping Inventory Management</h2>
        <button class="add-btn" onclick="openAddModal()">+ Add Topping</button>
    </div>

    <table>
    <thead>
    <tr><th>ID</th><th>Topping Name</th><th>Price (¥)</th><th>Stock Qty</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody id="toppingsTableBody">
    <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
    </tbody>
    </table>
</div>

<!-- Add/Edit Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add Topping</h3>
        <input type="text" id="toppingName" placeholder="Topping name">
        <input type="number" id="toppingPrice" placeholder="Price (¥)" step="0.5">
        <input type="number" id="toppingStock" placeholder="Stock quantity">
        <div class="modal-buttons">
            <button class="btn-save" onclick="saveTopping()">Save</button>
            <button class="btn-delete" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    let toppings = [];
    let editId = null;

    function checkAdminAuth() {
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'admin_login.html';
        }
    }
    checkAdminAuth();

    async function loadToppings() {
        try {
            const response = await fetch(`${API_BASE}/admin/toppings`);
            const result = await response.json();
            console.log('Topping list:', result);

            if (result.code === 200) {
                toppings = result.data;
                renderTable();
            } else {
                console.error('Failed to load toppings:', result.message);
            }
        } catch (error) {
            console.error('Network error:', error);
            // Use mock data
            toppings = [
                { toppingId: 1, name: 'Extra Cheese', price: 8, stockQuantity: 100 },
                { toppingId: 2, name: 'Bacon', price: 10, stockQuantity: 50 },
                { toppingId: 3, name: 'Mushroom', price: 6, stockQuantity: 80 },
                { toppingId: 4, name: 'Green Pepper', price: 5, stockQuantity: 15 },
                { toppingId: 5, name: 'Corn', price: 5, stockQuantity: 70 },
                { toppingId: 6, name: 'Onion', price: 4, stockQuantity: 90 }
            ];
            renderTable();
        }
    }

    function renderTable() {
        const tbody = document.getElementById('toppingsTableBody');
        if (!tbody) return;

        if (toppings.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No data</td></tr>';
            return;
        }

        tbody.innerHTML = toppings.map(t => {
            const toppingId = t.toppingId || t.topping_id;
            const name = t.name;
            const price = t.price;
            const stock = t.stockQuantity || t.stock_quantity;
            const isLowStock = stock < 20;

            return `
                    <tr>
                        <td>${toppingId}</td>
                        <td>${name}</td>
                        <td>¥${price}</td>
                        <td>
                            <input type="number" class="stock-input" id="stock_${toppingId}" value="${stock}" min="0">
                        </td>
                        <td class="${isLowStock ? 'low-stock' : ''}">${isLowStock ? '⚠️ Low Stock' : 'Sufficient'}</td>
                        <td>
                            <button class="btn-sm btn-edit" onclick="updateStock(${toppingId})">Update Stock</button>
                            <button class="btn-sm btn-delete" onclick="deleteTopping(${toppingId})">Delete</button>
                        </td>
                    </tr>
                `;
        }).join('');
    }

    async function updateStock(toppingId) {
        const input = document.getElementById(`stock_${toppingId}`);
        const newStock = parseInt(input.value);
        const topping = toppings.find(t => (t.toppingId || t.topping_id) === toppingId);

        if (!topping) return;

        try {
            const response = await fetch(`${API_BASE}/admin/toppings/${toppingId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: topping.name,
                    price: topping.price,
                    stockQuantity: newStock,
                    available: true
                })
            });
            const result = await response.json();
            if (result.code === 200) {
                alert('Stock updated');
                loadToppings();
            } else {
                alert(result.message || 'Update failed');
            }
        } catch (error) {
            console.error('Update failed:', error);
            alert('Network error, please try again later');
        }
    }

    async function deleteTopping(toppingId) {
        if (!confirm('Are you sure you want to delete this topping?')) return;

        try {
            const response = await fetch(`${API_BASE}/admin/toppings/${toppingId}`, {
                method: 'DELETE'
            });
            const result = await response.json();
            if (result.code === 200) {
                alert('Deleted');
                loadToppings();
            } else {
                alert(result.message || 'Delete failed');
            }
        } catch (error) {
            console.error('Delete failed:', error);
            alert('Network error');
        }
    }

    function openAddModal() {
        editId = null;
        document.getElementById('modalTitle').innerText = 'Add Topping';
        document.getElementById('toppingName').value = '';
        document.getElementById('toppingPrice').value = '';
        document.getElementById('toppingStock').value = '';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    async function saveTopping() {
        const name = document.getElementById('toppingName').value;
        const price = parseFloat(document.getElementById('toppingPrice').value);
        const stock = parseInt(document.getElementById('toppingStock').value);

        if (!name || isNaN(price) || isNaN(stock)) {
            alert('Please fill in all fields');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/admin/toppings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, stockQuantity: stock })
            });
            const result = await response.json();
            if (result.code === 200) {
                alert('Added successfully');
                closeModal();
                loadToppings();
            } else {
                alert(result.message || 'Add failed');
            }
        } catch (error) {
            console.error('Add failed:', error);
            alert('Network error');
        }
    }

    document.getElementById('adminLogoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('adminToken');
        localStorage.removeItem('adminInfo');
        window.location.href = 'admin_login.html';
    });

    loadToppings();
</script>
</body>
</html>
