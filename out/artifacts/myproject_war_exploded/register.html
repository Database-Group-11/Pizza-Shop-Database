<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register - Pizza shop takeout system</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
    <h1>📝 <span>register account</span></h1>
    <form id="registerForm">
        <div class="form-group">
            <label for="name">name</label>
            <input type="text" id="name" name="name" placeholder="please enter name" required>
        </div>
        <div class="form-group">
            <label for="phone">phone number</label>
            <input type="tel" id="phone" name="phone" placeholder="please enter phone number" required>
        </div>
        <div class="form-group">
            <label for="password">password</label>
            <input type="password" id="password" name="password" placeholder="please enter password" required>
        </div>
        <div class="form-group">
            <label for="confirmPassword">ensure password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="please confirm password" required>
        </div>
        <div class="form-group">
            <label for="address">地址</label>
            <input type="text" id="address" name="address" placeholder="please enter address" required>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="btn btn-primary">register</button>
    </form>
    <div class="link">
        already have account？ <a href=" ./login.html">login</a >
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
