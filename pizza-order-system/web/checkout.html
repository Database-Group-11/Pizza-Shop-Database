<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cart - pizza-shop takeout system</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .cart-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .cart-item-info {
            flex: 2;
        }
        .cart-item-info h4 {
            margin-bottom: 8px;
            color: #333;
        }
        .cart-item-toppings {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }
        .cart-item-toppings span {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 6px;
            display: inline-block;
            margin-bottom: 4px;
        }
        .cart-item-price {
            text-align: right;
            min-width: 120px;
        }
        .cart-item-price .item-total {
            font-size: 18px;
            font-weight: bold;
            color: #e74c3c;
        }
        .cart-item-price .unit-price {
            font-size: 12px;
            color: #999;
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .quantity-control button {
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .quantity-control button:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .quantity-control span {
            min-width: 30px;
            text-align: center;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 20px;
            padding: 0 8px;
        }
        .delete-btn:hover {
            opacity: 0.7;
        }
        .cart-summary {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .cart-summary .total {
            font-size: 24px;
            font-weight: bold;
        }
        .cart-summary .total span {
            color: #e74c3c;
            font-size: 28px;
        }
        .checkout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .checkout-btn:hover {
            opacity: 0.9;
        }
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
        }
        .empty-cart h3 {
            color: #666;
            margin-bottom: 20px;
        }
        .empty-cart a {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
        }
        .continue-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                align-items: stretch;
            }
            .cart-item-price {
                text-align: left;
            }
            .cart-summary {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar">
    <a href=" " class="navbar-brand">🍕pizza-shop takeout </a >
    <div class="navbar-menu">
        <a href="menu.html">menu</a >
        <a href="cart.html">cart <span id="cartCount" class="cart-badge">0</span></a >
        <a href="order_history.html">my order</a >
        <span id="userNameDisplay" style="color:#666;"></span>
        <a href="#" id="logoutBtn">exit</a >
    </div>
</nav>

<div class="container cart-container">
    <h1 style="margin-bottom: 24px;">🛒 cart</h1>
    <div id="cartContent">
        <!-- 动态加载购物车内容 -->
    </div>
</div>

<script src="js/main.js"></script>
<script>
    let currentCart = [];

    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const userNameSpan = document.getElementById('userNameDisplay');
        if (userNameSpan) {
            userNameSpan.textContent = `Welcome，${user.name}`;
        }

        loadCart();

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
        }
    });

    function loadCart() {
        currentCart = getCart();
        renderCart();
        updateCartCountDisplay();
    }

    function updateCartCountDisplay() {
        const count = currentCart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        const cartCountSpan = document.getElementById('cartCount');
        if (cartCountSpan) cartCountSpan.textContent = count;
    }

    function renderCart() {
        const container = document.getElementById('cartContent');
        if (!container) return;

        if (currentCart.length === 0) {
            container.innerHTML = `
                    <div class="empty-cart">
                        <h3>🛒 cart is still empty</h3>
                        <p style="color:#999; margin-bottom: 20px;">go add some delicious food!！</p >
                        <a href="menu.html">🍕 go order food</a >
                    </div>
                `;
            return;
        }

        let grandTotal = 0;

        const itemsHtml = currentCart.map((item, index) => {
            const toppingsTotal = (item.toppings || []).reduce((sum, t) => sum + (t.price * t.quantity), 0);
            const unitTotal = (item.basePrice || 0) + toppingsTotal;
            const itemTotal = unitTotal * (item.quantity || 1);
            grandTotal += itemTotal;

            const toppingsHtml = (item.toppings || []).map(t =>
                `<span>${t.name} x${t.quantity} (+¥${t.price * t.quantity})</span>`
            ).join('');

            return `
                    <div class="cart-item" data-index="${index}">
                        <div class="cart-item-info">
                            <h4>🍕 ${item.pizzaName || item.pizza_name}</h4>
                            <div class="cart-item-toppings">
                                ${toppingsHtml || '<span>no toppings</span>'}
                            </div>
                            <div class="unit-price">unit price：¥${unitTotal}</div>
                        </div>
                        <div class="cart-item-actions">
                            <div class="quantity-control">
                                <button onclick="updateQuantity(${index}, -1)">-</button>
                                <span id="qty_${index}">${item.quantity || 1}</span>
                                <button onclick="updateQuantity(${index}, 1)">+</button>
                            </div>
                            <div class="cart-item-price">
                                <div class="item-total">¥${itemTotal}</div>
                            </div>
                            <button class="delete-btn" onclick="removeItem(${index})">🗑️</button>
                        </div>
                    </div>
                `;
        }).join('');

        container.innerHTML = `
                ${itemsHtml}
                <div class="cart-summary">
                    <div class="total">总计：<span>¥${grandTotal}</span></div>
                    <div>
                        <button class="continue-btn" onclick="continueShopping()">keep shopping</button>
                        <button class="checkout-btn" onclick="goToCheckout()">checkout</button>
                    </div>
                </div>
            `;
    }

    function updateQuantity(index, delta) {
        if (index < 0 || index >= currentCart.length) return;

        const newQty = (currentCart[index].quantity || 1) + delta;
        if (newQty < 1) return;
        if (newQty > 99) return;

        currentCart[index].quantity = newQty;

        const toppingsTotal = (currentCart[index].toppings || []).reduce((sum, t) => sum + (t.price * t.quantity), 0);
        currentCart[index].total = ((currentCart[index].basePrice || 0) + toppingsTotal) * newQty;

        saveCart(currentCart);
        loadCart();
    }

    function removeItem(index) {
        if (index < 0 || index >= currentCart.length) return;

        if (confirm('sure to cancel this good?')) {
            currentCart.splice(index, 1);
            saveCart(currentCart);
            loadCart();
        }
    }

    function continueShopping() {
        window.location.href = 'menu.html';
    }

    function goToCheckout() {
        if (currentCart.length === 0) {
            alert('cart is still empty，please add goods');
            return;
        }
        window.location.href = 'checkout.html';
    }

    window.updateQuantity = updateQuantity;
    window.removeItem = removeItem;
    window.continueShopping = continueShopping;
    window.goToCheckout = goToCheckout;
</script>
</body>
</html>
