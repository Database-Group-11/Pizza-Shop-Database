<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单结算 - 披萨外卖系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section h3 {
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f0f0;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .total {
            font-size: 22px;
            font-weight: bold;
            text-align: right;
            margin-top: 16px;
        }
        .total span {
            color: #e74c3c;
            font-size: 28px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 8px;
        }
        .submit-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .back-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            margin-right: 12px;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="menu.html" class="navbar-brand">🍕 披萨外卖</a>
    <div class="navbar-menu">
        <a href="menu.html">菜单</a>
        <a href="cart.html">购物车 <span id="cartCount" class="cart-badge">0</span></a>
        <a href="order_history.html">我的订单</a>
        <span id="userNameDisplay"></span>
        <a href="#" id="logoutBtn">退出</a>
    </div>
</nav>

<div class="container checkout-container">
    <h1>📋 订单结算</h1>

    <div class="section">
        <h3>🍕 订单商品</h3>
        <div id="orderItemsList"></div>
        <div class="total">
            总计：¥<span id="totalAmount">0</span>
        </div>
    </div>

    <div class="section">
        <h3>📍 配送信息</h3>
        <input type="text" id="address" placeholder="请输入详细配送地址" required>
    </div>

    <div class="section">
        <h3>💳 支付方式</h3>
        <select id="paymentMethod">
            <option value="Credit Card">💳 信用卡</option>
            <option value="Alipay">📱 支付宝</option>
            <option value="WeChat Pay">💬 微信支付</option>
            <option value="Cash">💰 现金</option>
        </select>
    </div>

    <div style="display: flex; gap: 12px;">
        <button class="back-btn" onclick="window.location.href='cart.html'">返回购物车</button>
        <button class="submit-btn" id="submitOrderBtn">提交订单</button>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    let cart = [];

    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        document.getElementById('userNameDisplay').textContent = `欢迎，${user.name}`;

        loadCart();
        updateCartCount();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);
    });

    function updateCartCount() {
        const cartData = getCart();
        const count = cartData.reduce((sum, item) => sum + (item.quantity || 1), 0);
        const span = document.getElementById('cartCount');
        if (span) span.textContent = count;
    }

    function loadCart() {
        cart = getCart();
        const container = document.getElementById('orderItemsList');
        let total = 0;

        if (!cart || cart.length === 0) {
            container.innerHTML = '<div>购物车为空，请先添加商品</div>';
            return;
        }

        container.innerHTML = cart.map(item => {
            const itemTotal = item.total || ((item.basePrice || 0) + (item.toppings || []).reduce((s, t) => s + t.price * t.quantity, 0)) * (item.quantity || 1);
            total += itemTotal;
            return `
                <div class="order-item">
                    <span>${item.pizzaName} x${item.quantity}</span>
                    <span>¥${itemTotal}</span>
                </div>
            `;
        }).join('');

        document.getElementById('totalAmount').textContent = total.toFixed(2);
    }

    async function submitOrder() {
        const user = getCurrentUser();
        const address = document.getElementById('address').value;
        const paymentMethod = document.getElementById('paymentMethod').value;

        if (!address) {
            alert('请填写配送地址');
            return;
        }

        if (!cart || cart.length === 0) {
            alert('购物车为空');
            return;
        }

        const totalAmount = cart.reduce((sum, item) => sum + (item.total || ((item.basePrice || 0) + (item.toppings || []).reduce((s, t) => s + t.price * t.quantity, 0)) * (item.quantity || 1)), 0);

        const orderData = {
            customerId: user.customerId,
            deliveryAddress: address,
            paymentMethod: paymentMethod,
            totalAmount: totalAmount,
            items: cart.map(item => ({
                pizzaId: item.pizzaId,
                quantity: item.quantity,
                toppingIds: (item.toppings || []).map(t => t.toppingId)
            }))
        };

        try {
            const response = await fetch(`${API_BASE}/api/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            const result = await response.json();

            if (result.code === 200) {
                alert('订单提交成功！');
                localStorage.removeItem('cart');
                window.location.href = 'order_history.html';
            } else {
                alert('提交失败：' + result.message);
            }
        } catch (error) {
            console.error('提交订单失败:', error);
            alert('网络错误，请稍后重试');
        }
    }
</script>
</body>
</html>
