<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px 0;
        }
        .admin-sidebar h3 {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid #444;
            margin-bottom: 20px;
        }
        .admin-sidebar a {
            display: block;
            padding: 12px 24px;
            color: #ddd;
            text-decoration: none;
            transition: 0.2s;
        }
        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: #e74c3c;
            color: white;
        }
        .admin-content {
            margin-left: 240px;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .admin-header {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .status-select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .btn-primary-sm {
            background: #3498db;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 380px;
        }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-content select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-buttons {
            display: flex; gap: 12px;
        }
        .modal-buttons button {
            flex: 1; padding: 10px;
            border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px;
        }
        .btn-confirm { background: #27ae60; color: white; }
        .btn-cancel { background: #e74c3c; color: white; }
        @media (max-width: 1000px) {
            .admin-sidebar { width: 200px; }
            .admin-content { margin-left: 200px; }
            .stats-cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="admin-sidebar">
    <h3>Pizza Admin</h3>
    <a href="admin_orders.html" class="active">Order Management</a>
    <a href="admin_inventory.html">Topping Inventory</a>
    <a href="admin_reports.html">Reports</a>
    <a href="menu.html" style="margin-top: 50px;">Back to Store</a>
    <a href="#" id="adminLogoutBtn">Logout</a>
</div>

<div class="admin-content">
    <div class="admin-header">
        <h2>Order Management</h2>
        <span>Admin: <span id="adminName">admin</span></span>
    </div>

    <div class="stats-cards">
        <div class="stat-card"><div class="number" id="totalOrders">0</div><div>Total Orders</div></div>
        <div class="stat-card"><div class="number" id="pendingOrders">0</div><div>Pending</div></div>
        <div class="stat-card"><div class="number" id="deliveringOrders">0</div><div>Delivering</div></div>
        <div class="stat-card"><div class="number" id="completedOrders">0</div><div>Completed</div></div>
    </div>

    <table>
        <thead>
        <tr><th>Order #</th><th>User</th><th>Total</th><th>Status</th><th>Order Time</th><th>Actions</th></tr>
        </thead>
        <tbody id="ordersTableBody"></tbody>
    </table>

    <!-- Rider Assignment Modal -->
    <div id="riderModal" class="modal">
        <div class="modal-content">
            <h3>Assign Rider</h3>
            <p style="margin-bottom:12px;color:#666;">Order #<span id="riderModalOrderId"></span></p>
            <select id="riderSelect">
                <option value="">-- Select Rider --</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="cancelAssignRider()">Cancel</button>
                <button class="btn-confirm" onclick="confirmAssignRider()">Assign</button>
            </div>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    const RIDERS = [
        { name: 'Rider Zhang', phone: '13800001111' },
        { name: 'Rider Li',   phone: '13800002222' },
        { name: 'Rider Wang', phone: '13800003333' },
        { name: 'Rider Zhao', phone: '13800004444' },
        { name: 'Rider Liu',  phone: '13800005555' }
    ];

    let allOrders = [];
    let pendingOrderId = null;
    let pendingSelectEl = null;

    // Populate rider dropdown
    const riderSelect = document.getElementById('riderSelect');
    RIDERS.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.name;
        opt.textContent = `${r.name} (${r.phone})`;
        riderSelect.appendChild(opt);
    });

    function checkAdminAuth() {
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'admin_login.html';
        }
    }
    checkAdminAuth();

    // Show admin name
    const adminInfo = localStorage.getItem('adminInfo');
    if (adminInfo) {
        try {
            const info = JSON.parse(adminInfo);
            document.getElementById('adminName').innerText = info.username || 'admin';
        } catch(e) {}
    }

    async function loadOrders() {
        try {
            const response = await fetch(`${API_BASE}/api/admin/orders`);
            const result = await response.json();
            console.log('Order list:', result);

            if (result.code === 200) {
                allOrders = result.data;
                renderStats();
                renderTable();
            } else {
                console.error('Failed to load orders:', result.message);
            }
        } catch (error) {
            console.error('Network error:', error);
        }
    }

    function renderStats() {
        const total = allOrders.length;
        const pending = allOrders.filter(o => o.status === 'pending').length;
        const delivering = allOrders.filter(o => o.status === 'delivering').length;
        const completed = allOrders.filter(o => o.status === 'completed').length;

        document.getElementById('totalOrders').innerText = total;
        document.getElementById('pendingOrders').innerText = pending;
        document.getElementById('deliveringOrders').innerText = delivering;
        document.getElementById('completedOrders').innerText = completed;
    }

    function renderTable() {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = allOrders.map(order => `
                <tr>
                    <td>${order.orderId || order.order_id}</td>
                    <td>${order.customerName || order.customer_name || order.customerId}</td>
                    <td>¥${order.totalAmount || order.total_amount}</td>
                    <td>
                        <select class="status-select" data-id="${order.orderId || order.order_id}" data-original="${order.status}" onchange="updateStatus(${order.orderId || order.order_id}, this)">
                            <option value="pending" ${(order.status === 'pending') ? 'selected' : ''}>Pending</option>
                            <option value="paid" ${(order.status === 'paid') ? 'selected' : ''}>Paid</option>
                            <option value="preparing" ${(order.status === 'preparing') ? 'selected' : ''}>Preparing</option>
                            <option value="delivering" ${(order.status === 'delivering') ? 'selected' : ''}>Delivering</option>
                            <option value="completed" ${(order.status === 'completed') ? 'selected' : ''}>Completed</option>
                            <option value="cancelled" ${(order.status === 'cancelled') ? 'selected' : ''}>Cancelled</option>
                        </select>
                    </td>
                    <td>${formatDate(order.orderTime || order.order_time)}</td>
                    <td><button class="btn-sm btn-primary-sm" onclick="viewOrder(${order.orderId || order.order_id})">View</button></td>
                </tr>
            `).join('');
    }

    async function updateStatus(orderId, selectEl) {
        const newStatus = selectEl.value;

        if (newStatus === 'delivering') {
            pendingOrderId = orderId;
            pendingSelectEl = selectEl;
            document.getElementById('riderModalOrderId').textContent = orderId;
            document.getElementById('riderModal').style.display = 'flex';
            return;
        }

        await doUpdateStatus(orderId, newStatus, selectEl);
    }

    async function doUpdateStatus(orderId, newStatus, selectEl) {
        try {
            const response = await fetch(`${API_BASE}/api/admin/orders/${orderId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            const result = await response.json();
            if (result.code === 200) {
                alert('Order status updated');
                loadOrders();
            } else {
                alert(result.message || 'Update failed');
                if (selectEl) selectEl.value = selectEl.dataset.original;
            }
        } catch (error) {
            console.error('Update failed:', error);
            alert('Network error');
            if (selectEl) selectEl.value = selectEl.dataset.original;
        }
    }

    async function confirmAssignRider() {
        const riderName = document.getElementById('riderSelect').value;
        if (!riderName) {
            alert('Please select a rider');
            return;
        }
        const rider = RIDERS.find(r => r.name === riderName);

        try {
            // 1. Get or create delivery record for this order
            let deliveryId = null;
            const delRes = await fetch(`${API_BASE}/api/deliveries/order?orderId=${pendingOrderId}`);
            if (delRes.ok) {
                const delData = await delRes.json();
                deliveryId = delData.deliveryId;
            }

            // If no delivery record, create one
            if (!deliveryId) {
                // Get order details for address info
                const orderRes = await fetch(`${API_BASE}/api/admin/orders`);
                const orderData = await orderRes.json();
                const orders = orderData.data || [];
                const order = orders.find(o => (o.orderId || o.order_id) == pendingOrderId);

                const createRes = await fetch(`${API_BASE}/api/deliveries`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderId: pendingOrderId,
                        deliveryAddress: (order && (order.deliveryAddress || order.delivery_address)) || 'Admin assigned',
                        contactPhone: '0000000000'
                    })
                });
                const createData = await createRes.json();
                if (!createData.success) {
                    alert(createData.error || 'Failed to create delivery record');
                    cancelAssignRider();
                    return;
                }
                deliveryId = createData.deliveryId;
            }

            // 2. Assign rider to delivery
            const assignRes = await fetch(`${API_BASE}/api/deliveries/assign`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deliveryId, driverName: rider.name, driverPhone: rider.phone })
            });
            const assignResult = await assignRes.json();
            if (!assignResult.success) {
                alert(assignResult.error || 'Failed to assign rider');
                cancelAssignRider();
                return;
            }

            // 3. Update order status to delivering
            await doUpdateStatus(pendingOrderId, 'delivering', pendingSelectEl);
        } catch (error) {
            console.error('Assign failed:', error);
            alert('Network error');
        }

        document.getElementById('riderModal').style.display = 'none';
        pendingOrderId = null;
        pendingSelectEl = null;
    }

    function cancelAssignRider() {
        document.getElementById('riderModal').style.display = 'none';
        if (pendingSelectEl) {
            pendingSelectEl.value = pendingSelectEl.dataset.original;
        }
        pendingOrderId = null;
        pendingSelectEl = null;
    }

    function viewOrder(orderId) {
        window.open(`order_status.html?order_id=${orderId}`, '_blank');
    }

    document.getElementById('adminLogoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('adminToken');
        localStorage.removeItem('adminInfo');
        window.location.href = 'admin_login.html';
    });

    loadOrders();
</script>
</body>
</html>
