<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - 后台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px 0;
        }
        .admin-sidebar h3 {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid #444;
            margin-bottom: 20px;
        }
        .admin-sidebar a {
            display: block;
            padding: 12px 24px;
            color: #ddd;
            text-decoration: none;
            transition: 0.2s;
        }
        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: #e74c3c;
            color: white;
        }
        .admin-content {
            margin-left: 240px;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .admin-header {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .status-select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .btn-primary-sm {
            background: #3498db;
            color: white;
        }
        @media (max-width: 1000px) {
            .admin-sidebar { width: 200px; }
            .admin-content { margin-left: 200px; }
            .stats-cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="admin-sidebar">
    <h3>🍕 披萨后台</h3>
    <a href=" " class="active">📋 订单管理</a >
    <a href="admin_inventory.html">📦 配料库存</a >
    <a href="admin_reports.html">📊 数据报表</a >
    <a href="menu.html" style="margin-top: 50px;">🏠 返回前台</a >
    <a href="#" id="adminLogoutBtn">🚪 退出登录</a >
</div>

<div class="admin-content">
    <div class="admin-header">
        <h2>订单管理</h2>
        <span>管理员：admin</span>
    </div>

    <div class="stats-cards">
        <div class="stat-card"><div class="number" id="totalOrders">0</div><div>总订单</div></div>
        <div class="stat-card"><div class="number" id="pendingOrders">0</div><div>待支付</div></div>
        <div class="stat-card"><div class="number" id="deliveringOrders">0</div><div>配送中</div></div>
        <div class="stat-card"><div class="number" id="completedOrders">0</div><div>已完成</div></div>
    </div>

    <table id="ordersTable">
        <thead>
        <tr><th>订单号</th><th>用户ID</th><th>总金额</th><th>状态</th><th>下单时间</th><th>操作</th></tr>
        </thead>
        <tbody id="ordersTableBody"></tbody>
    </table>
</div>

<script src="../js/main.js"></script>
<script>
    let allOrders = [];

    function checkAdminAuth() {
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'admin_login.html';
    }
    checkAdminAuth();

    function loadOrders() {
        const saved = localStorage.getItem('orders');
        if (saved) allOrders = JSON.parse(saved);
        else allOrders = getMockOrders();
        renderStats();
        renderTable();
    }

    function getMockOrders() {
        return [
            { order_id: 1001, customer_id: 1, total_price: 88, status: '待支付', order_date: '2024-05-10T08:30:00' },
            { order_id: 1002, customer_id: 2, total_price: 59, status: '配送中', order_date: '2024-05-12T12:15:00' },
            { order_id: 1003, customer_id: 1, total_price: 104, status: '已完成', order_date: '2024-05-14T18:45:00' }
        ];
    }

    function renderStats() {
        document.getElementById('totalOrders').innerText = allOrders.length;
        document.getElementById('pendingOrders').innerText = allOrders.filter(o => o.status === '待支付').length;
        document.getElementById('deliveringOrders').innerText = allOrders.filter(o => o.status === '配送中').length;
        document.getElementById('completedOrders').innerText = allOrders.filter(o => o.status === '已完成').length;
    }

    function renderTable() {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = allOrders.map(order => `
                <tr>
                    <td>${order.order_id}</td>
                    <td>${order.customer_id}</td>
                    <td>¥${order.total_price}</td>
                    <td>
                        <select class="status-select" data-id="${order.order_id}" onchange="updateStatus(${order.order_id}, this.value)">
                            <option value="待支付" ${order.status === '待支付' ? 'selected' : ''}>待支付</option>
                            <option value="已支付" ${order.status === '已支付' ? 'selected' : ''}>已支付</option>
                            <option value="制作中" ${order.status === '制作中' ? 'selected' : ''}>制作中</option>
                            <option value="配送中" ${order.status === '配送中' ? 'selected' : ''}>配送中</option>
                            <option value="已完成" ${order.status === '已完成' ? 'selected' : ''}>已完成</option>
                            <option value="已取消" ${order.status === '已取消' ? 'selected' : ''}>已取消</option>
                        </select>
                    </td>
                    <td>${formatDate(order.order_date)}</td>
                    <td><button class="btn-sm btn-primary-sm" onclick="viewOrder(${order.order_id})">查看</button></td>
                </tr>
            `).join('');
    }

    function updateStatus(orderId, newStatus) {
        const order = allOrders.find(o => o.order_id == orderId);
        if (order) {
            order.status = newStatus;
            localStorage.setItem('orders', JSON.stringify(allOrders));
            renderStats();
        }
    }

    function viewOrder(orderId) {
        window.open(`order_status.html?order_id=${orderId}`, '_blank');
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    document.getElementById('adminLogoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('adminToken');
        window.location.href = 'admin_login.html';
    });

    loadOrders();
</script>
</body>
</html>
