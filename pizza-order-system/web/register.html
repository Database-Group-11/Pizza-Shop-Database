<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 披萨外卖系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
    <h1>📝 <span>注册账号</span></h1>
    <form id="registerForm">
        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="name" placeholder="请输入姓名" required>
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" id="phone" placeholder="请输入手机号" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请设置密码" required>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
        </div>
        <div class="form-group">
            <label>地址</label>
            <input type="text" id="address" placeholder="请输入配送地址" required>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="btn btn-primary">注册</button>
    </form>
    <div class="link">
        已有账号？ <a href=" ">去登录</a >
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
