<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login - Pizza shop takeout system</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
  <h1>🍕 <span>Pizza shop takeout</span></h1>
  <form id="loginForm">
    <div class="form-group">
      <label for="phone">phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="please enter phone number" required>
    </div>
    <div class="form-group">
      <label for="password">password</label>
      <input type="password" id="password" name="password" placeholder="请输入密码" required>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button type="submit" class="btn btn-primary">login</button>
  </form>
  <div class="link">
    no account? <a href="./register.html ">register now</a >
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
