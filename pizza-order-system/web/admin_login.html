<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 披萨外卖系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        .admin-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .admin-card h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #333;
        }
        .admin-card .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #2c3e50, #1a1a2e);">
<div class="admin-login-container">
    <div class="admin-card">
        <h1>🔐 后台管理系统</h1>
        <div class="subtitle">披萨外卖 - 管理员登录</div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入管理员账号" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <button type="submit" class="btn btn-primary">登录后台</button>
        </form>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    // 如果已登录，直接跳转
    if (localStorage.getItem('adminToken')) {
        window.location.href = 'admin_orders.html';
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_BASE}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await response.json();
            if (result.code === 200) {
                localStorage.setItem('adminToken', JSON.stringify(result.data));
                localStorage.setItem('adminInfo', JSON.stringify(result.data));
                window.location.href = 'admin_orders.html';
            } else {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = result.message || 'Wrong user name or password';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = 'Internet error, please try later';
            errorMsg.style.display = 'block';
        }
    });
</script>
</body>
</html>
