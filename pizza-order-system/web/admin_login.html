<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Pizza Takeout System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        .admin-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .admin-card h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #333;
        }
        .admin-card .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #2c3e50, #1a1a2e);">
<div class="admin-login-container">
    <div class="admin-card">
        <h1>Admin System</h1>
        <div class="subtitle">Pizza Takeout - Admin Login</div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Please enter admin account" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Please enter password" required>
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <button type="submit" class="btn btn-primary">Login to Admin</button>
        </form>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    // If already logged in, redirect directly
    if (localStorage.getItem('adminToken')) {
        window.location.href = 'admin_orders.html';
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_BASE}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const text = await response.text();
            console.log('Admin login response status:', response.status, 'body:', text);
            let result;
            try {
                result = JSON.parse(text);
            } catch (e) {
                throw new Error('Server returned non-JSON response (status ' + response.status + '): ' + text.substring(0, 200));
            }
            if (result.code === 200) {
                localStorage.setItem('adminToken', JSON.stringify(result.data));
                localStorage.setItem('adminInfo', JSON.stringify(result.data));
                window.location.href = 'admin_orders.html';
            } else {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = result.message || 'Wrong user name or password';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            console.error('Admin login error:', error);
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = 'Network error: ' + (error.message || 'please try later');
            errorMsg.style.display = 'block';
        }
    });
</script>
</body>
</html>
