<script src="js/main.js"></script>
<script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document ;document.getElementById('password').value;

        try {
            const response = await fetch(`${API_BASE}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await response.json();
            if (result.code === 200) {
                localStorage.setItem('adminToken', JSON.stringify(result.data));
                localStorage.setItem('adminInfo', JSON.stringify(result.data));
                window.location.href = 'admin_orders.html';
            } else {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = result.message || '用户名或密码错误';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '网络错误，请稍后重试';
            errorMsg.style.display = 'block';
        }
    });

    // 如果已登录，直接跳转
    if (localStorage.getItem('adminToken')) {
        window.location.href = 'admin_orders.html';
    }
</script>
