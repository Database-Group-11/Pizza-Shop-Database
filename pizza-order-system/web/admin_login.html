<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 披萨外卖系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        .admin-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .admin-card h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #333;
        }
        .admin-card .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #2c3e50, #1a1a2e);">
<div class="admin-login-container">
    <div class="admin-card">
        <h1>🔐 后台管理系统</h1>
        <div class="subtitle">披萨外卖 - 管理员登录</div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入管理员账号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <button type="submit" class="btn btn-primary">登录后台</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // 模拟验证（实际应该调后端）
        if (username === 'admin' && password === '123456') {
            localStorage.setItem('adminToken', 'mock-admin-token');
            window.location.href = 'admin_orders.html';
        } else {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '用户名或密码错误（默认 admin/123456）';
            errorMsg.style.display = 'block';
        }
    });
</script>
</body>
</html>
