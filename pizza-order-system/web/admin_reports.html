<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据报表 - 后台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px 0;
        }
        .admin-sidebar h3 {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid #444;
            margin-bottom: 20px;
        }
        .admin-sidebar a {
            display: block;
            padding: 12px 24px;
            color: #ddd;
            text-decoration: none;
            transition: 0.2s;
        }
        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: #e74c3c;
            color: white;
        }
        .admin-content {
            margin-left: 240px;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .admin-header {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #e74c3c;
        }
        .stat-card .label {
            color: #666;
            margin-top: 8px;
        }
        .report-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .report-section h3 {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .sales-list {
            list-style: none;
            padding: 0;
        }
        .sales-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .rank-1 { color: #f39c12; font-weight: bold; }
        .rank-2 { color: #95a5a6; font-weight: bold; }
        .rank-3 { color: #cd6133; font-weight: bold; }
        .export-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="admin-sidebar">
    <h3>🍕 披萨后台</h3>
    <a href=" ">📋 订单管理</a >
    <a href="admin_inventory.html">📦 配料库存</a >
    <a href="admin_reports.html" class="active">📊 数据报表</a >
    <a href="menu.html" style="margin-top: 50px;">🏠 返回前台</a >
    <a href="#" id="adminLogoutBtn">🚪 退出登录</a >
</div>

<div class="admin-content">
    <div class="admin-header">
        <h2>数据报表</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="number" id="totalSales">0</div><div class="label">总营业额(元)</div></div>
        <div class="stat-card"><div class="number" id="totalOrderCount">0</div><div class="label">总订单数</div></div>
        <div class="stat-card"><div class="number" id="avgOrderAmount">0</div><div class="label">客单价(元)</div></div>
    </div>

    <div class="report-section">
        <h3>🏆 畅销披萨 TOP 3</h3>
        <ul class="sales-list" id="topPizzas"></ul>
    </div>

    <div class="report-section">
        <h3>📈 近7天订单趋势</h3>
        <div id="trendChart" style="height: 200px; display: flex; align-items: flex-end; gap: 16px; padding: 20px 0;"></div>
    </div>

    <div class="report-section">
        <h3>🍕 披萨销量统计</h3>
        <ul class="sales-list" id="allPizzaSales"></ul>
    </div>

    <button class="export-btn" onclick="exportReport()">📎 导出报表(JSON)</button>
</div>

<script>
    function checkAdminAuth() {
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'admin_login.html';
    }
    checkAdminAuth();

    function loadReport() {
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        const completedOrders = orders.filter(o => o.status === '已完成');

        // 总营业额
        const totalSales = completedOrders.reduce((sum, o) => sum + o.total_price, 0);
        document.getElementById('totalSales').innerText = totalSales;
        document.getElementById('totalOrderCount').innerText = completedOrders.length;
        document.getElementById('avgOrderAmount').innerText = completedOrders.length > 0 ? (totalSales / completedOrders.length).toFixed(0) : 0;

        // 统计披萨销量
        const pizzaSales = {};
        completedOrders.forEach(order => {
            (order.items || []).forEach(item => {
                const name = item.pizza_name;
                const qty = item.quantity;
                pizzaSales[name] = (pizzaSales[name] || 0) + qty;
            });
        });

        const sorted = Object.entries(pizzaSales).sort((a,b) => b[1] - a[1]);
        const top3 = sorted.slice(0, 3);

        const topHtml = top3.map(([name, qty], idx) =>
            `<li class="rank-${idx+1}"><span>${idx+1}. ${name}</span><span>销量: ${qty}</span></li>`
        ).join('');
        document.getElementById('topPizzas').innerHTML = topHtml || '<li>暂无数据</li>';

        const allHtml = sorted.map(([name, qty]) =>
            `<li><span>${name}</span><span>销量: ${qty}</span></li>`
        ).join('');
        document.getElementById('allPizzaSales').innerHTML = allHtml || '<li>暂无数据</li>';

        // 模拟近7天趋势
        const trendHtml = ['一','二','三','四','五','六','日'].map((day, i) => {
            const height = 40 + Math.random() * 100;
            return `<div style="flex:1; text-align:center;"><div style="height:${height}px; background:#e74c3c; border-radius:6px; width:100%;"></div><div style="margin-top:8px;">周${day}</div></div>`;
        }).join('');
        document.getElementById('trendChart').innerHTML = trendHtml;
    }

    function exportReport() {
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        const toppings = JSON.parse(localStorage.getItem('toppings') || '[]');
        const report = { exportTime: new Date().toISOString(), orders, toppings };
        const dataStr = JSON.stringify(report, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `report_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('报表已导出');
    }

    document.getElementById('adminLogoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('adminToken');
        window.location.href = 'admin_login.html';
    });

    loadReport();
</script>
</body>
</html>
