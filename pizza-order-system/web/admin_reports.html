<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px 0;
        }
        .admin-sidebar h3 {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid #444;
            margin-bottom: 20px;
        }
        .admin-sidebar a {
            display: block;
            padding: 12px 24px;
            color: #ddd;
            text-decoration: none;
            transition: 0.2s;
        }
        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: #e74c3c;
            color: white;
        }
        .admin-content {
            margin-left: 240px;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .admin-header {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #e74c3c;
        }
        .stat-card .label {
            color: #666;
            margin-top: 8px;
        }
        .report-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .report-section h3 {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .sales-list {
            list-style: none;
            padding: 0;
        }
        .sales-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .rank-1 { color: #f39c12; font-weight: bold; }
        .rank-2 { color: #95a5a6; font-weight: bold; }
        .rank-3 { color: #cd6133; font-weight: bold; }
        .export-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 16px;
        }
        .trend-chart {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            padding: 20px 0;
            height: 220px;
        }
        .trend-bar {
            flex: 1;
            text-align: center;
        }
        .bar {
            background: #e74c3c;
            border-radius: 6px;
            width: 100%;
            transition: height 0.3s;
        }
        .bar-label {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }
        .bar-value {
            font-size: 12px;
            color: #e74c3c;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
<div class="admin-sidebar">
    <h3>🍕 Pizza Admin</h3>
    <a href=" ">📋 Order Management</a>
    <a href="admin_inventory.html">📦 Topping Inventory</a>
    <a href="admin_reports.html" class="active">📊 Reports</a>
    <a href="menu.html" style="margin-top: 50px;">🏠 Back to Store</a>
    <a href="#" id="adminLogoutBtn">🚪 Logout</a>
</div>

<div class="admin-content">
    <div class="admin-header">
        <h2>Reports</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="number" id="totalSales">0</div>
            <div class="label">Total Revenue (¥)</div>
        </div>
        <div class="stat-card">
            <div class="number" id="totalOrderCount">0</div>
            <div class="label">Total Orders</div>
        </div>
        <div class="stat-card">
            <div class="number" id="avgOrderAmount">0</div>
            <div class="label">Avg Order Value (¥)</div>
        </div>
    </div>

    <div class="report-section">
        <h3>🏆 Top Selling Pizzas TOP 3</h3>
        <ul class="sales-list" id="topPizzas">
            <li>Loading...</li>
        </ul>
    </div>

    <div class="report-section">
        <h3>📈 Last 7 Days Order Trend</h3>
        <div id="trendChart" class="trend-chart">
            <div style="text-align:center; width:100%;">Loading...</div>
        </div>
    </div>

    <div class="report-section">
        <h3>🍕 Pizza Sales Statistics</h3>
        <ul class="sales-list" id="allPizzaSales">
            <li>Loading...</li>
        </ul>
    </div>

    <button class="export-btn" onclick="exportReport()">📎 Export Report (JSON)</button>
</div>

<script src="js/main.js"></script>
<script>
    function checkAdminAuth() {
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'admin_login.html';
        }
    }
    checkAdminAuth();

    async function loadReport() {
        try {
            const response = await fetch(`${API_BASE}/admin/reports`);
            const result = await response.json();
            console.log('Report data:', result);

            if (result.code === 200) {
                const data = result.data;
                document.getElementById('totalSales').innerText = data.totalRevenue || 0;
                document.getElementById('totalOrderCount').innerText = data.totalOrders || 0;
                document.getElementById('avgOrderAmount').innerText = data.avgOrderValue || 0;

                const topPizzas = data.topPizzas || [];
                if (topPizzas.length > 0) {
                    const topHtml = topPizzas.slice(0, 3).map((pizza, idx) =>
                        `<li class="rank-${idx+1}">
                                <span>${idx+1}. ${pizza.pizzaName || pizza.name}</span>
                                <span>Sales: ${pizza.totalQuantity || pizza.quantity}</span>
                            </li>`
                    ).join('');
                    document.getElementById('topPizzas').innerHTML = topHtml;

                    const allHtml = topPizzas.map(pizza =>
                        `<li>
                                <span>${pizza.pizzaName || pizza.name}</span>
                                <span>Sales: ${pizza.totalQuantity || pizza.quantity}</span>
                            </li>`
                    ).join('');
                    document.getElementById('allPizzaSales').innerHTML = allHtml;
                } else {
                    document.getElementById('topPizzas').innerHTML = '<li>No data</li>';
                    document.getElementById('allPizzaSales').innerHTML = '<li>No data</li>';
                }

                renderTrendChart(data.dailyOrders || []);
            } else {
                console.error('Failed to load report:', result.message);
                setMockData();
            }
        } catch (error) {
            console.error('Network error:', error);
            setMockData();
        }
    }

    function setMockData() {
        document.getElementById('totalSales').innerText = '12580';
        document.getElementById('totalOrderCount').innerText = '156';
        document.getElementById('avgOrderAmount').innerText = '80.6';

        document.getElementById('topPizzas').innerHTML = `
                <li class="rank-1"><span>1. Classic Margherita</span><span>Sales: 45</span></li>
                <li class="rank-2"><span>2. Supreme</span><span>Sales: 38</span></li>
                <li class="rank-3"><span>3. Seafood Mix</span><span>Sales: 32</span></li>
            `;
        document.getElementById('allPizzaSales').innerHTML = `
                <li><span>Classic Margherita</span><span>Sales: 45</span></li>
                <li><span>Supreme</span><span>Sales: 38</span></li>
                <li><span>Seafood Mix</span><span>Sales: 32</span></li>
                <li><span>Hawaiian Style</span><span>Sales: 28</span></li>
                <li><span>Four Cheese</span><span>Sales: 25</span></li>
            `;

        const mockDaily = [
            { date: '5/14', count: 12 }, { date: '5/15', count: 18 }, { date: '5/16', count: 15 },
            { date: '5/17', count: 22 }, { date: '5/18', count: 28 }, { date: '5/19', count: 35 },
            { date: '5/20', count: 30 }
        ];
        renderTrendChart(mockDaily);
    }

    function renderTrendChart(dailyData) {
        const container = document.getElementById('trendChart');
        if (!container) return;

        if (!dailyData || dailyData.length === 0) {
            container.innerHTML = '<div style="text-align:center; width:100%;">No data</div>';
            return;
        }

        const maxCount = Math.max(...dailyData.map(d => d.count), 1);

        container.innerHTML = dailyData.map(day => {
            const height = (day.count / maxCount) * 120 + 20;
            return `
                    <div class="trend-bar">
                        <div class="bar-value">${day.count}</div>
                        <div class="bar" style="height: ${height}px; min-height: 20px;"></div>
                        <div class="bar-label">${day.date || day.day}</div>
                    </div>
                `;
        }).join('');
    }

    function exportReport() {
        const report = {
            exportTime: new Date().toISOString(),
            totalSales: document.getElementById('totalSales').innerText,
            totalOrders: document.getElementById('totalOrderCount').innerText,
            avgOrderAmount: document.getElementById('avgOrderAmount').innerText,
            topPizzas: [],
            allPizzaSales: []
        };

        // Collect top pizza data
        const topItems = document.querySelectorAll('#topPizzas li');
        topItems.forEach(item => {
            const text = item.innerText;
            const match = text.match(/(\d+\.\s*)?(.+?)\s*Sales:\s*(\d+)/);
            if (match) {
                report.topPizzas.push({ name: match[2], quantity: parseInt(match[3]) });
            }
        });

        const dataStr = JSON.stringify(report, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `report_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('Report exported');
    }

    document.getElementById('adminLogoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('adminToken');
        localStorage.removeItem('adminInfo');
        window.location.href = 'admin_login.html';
    });

    loadReport();
</script>
</body>
</html>
